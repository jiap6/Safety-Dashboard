<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safety Dashboard</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    header {
      background: #9393d8;
      color: white;
      padding: 12px 20px;
      font-size: 18px;
      font-weight: 500;
    }
    #map {
      width: 100%;
      flex: 1;
    }
  </style>
</head>

<body>

  <header>Safety Dashboard</header>

  <!-- This div is where Leaflet will draw the map -->
  <div id="map"></div>


  <!-- Leaflet JS — load this BEFORE your own script -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>

    // lat and long of lexington, ky 
    const cityCenter = [
  38.047989,
  -84.501640
];
    
    const map = L.map('map').setView(cityCenter, 14);


    //add the map tiles 
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);


    L.marker(cityCenter).bindPopup('Lexington, KY').addTo(map)
    map.on('click', function(e) {
      console.log( e.latlng );
    });

  </script>

</body>
</html>
